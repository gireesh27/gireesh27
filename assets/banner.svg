<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 550" width="1600" height="550">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04010a" />
      <stop offset="40%" stop-color="#0b0320" />
      <stop offset="100%" stop-color="#020005" />
    </linearGradient>

    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    
    <linearGradient id="neonMagenta" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f093fb" />
      <stop offset="100%" stop-color="#7028e4" />
    </linearGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#e0c3fc" />
      <stop offset="100%" stop-color="#8ec5fc" />
    </linearGradient>

    <filter id="hyperGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur1" />
      <feGaussianBlur stdDeviation="24" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glassShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#000000" flood-opacity="0.7"/>
    </filter>
  </defs>

  <rect width="1600" height="550" fill="url(#bgGrad)" />

  <g filter="url(#hyperGlow)" opacity="0.4">
    <ellipse cx="200" cy="400" rx="250" ry="150" fill="url(#neonMagenta)">
      <animate attributeName="rx" values="250; 300; 250" dur="12s" repeatCount="indefinite" />
    </ellipse>
    <ellipse cx="1400" cy="150" rx="300" ry="200" fill="url(#neonCyan)">
      <animate attributeName="ry" values="200; 250; 200" dur="15s" repeatCount="indefinite" />
    </ellipse>
  </g>

  <g stroke="url(#neonCyan)" stroke-width="2" stroke-opacity="0.4" filter="url(#softGlow)">
    <path d="M 150 150 L 300 280 L 180 420 L 350 480 M 300 280 L 400 380 L 350 480" fill="none" />
    <path d="M 300 280 L 500 250 M 400 380 L 600 380" fill="none" stroke-opacity="0.2" />

    <path d="M 1450 120 L 1300 250 L 1420 380 L 1250 480 M 1300 250 L 1200 350 L 1250 480" fill="none" />
    <path d="M 1300 250 L 1100 250 M 1200 350 L 1000 380" fill="none" stroke-opacity="0.2" />

    <path d="M 150 150 L 300 280 L 500 250" fill="none" stroke="#fff" stroke-width="3" stroke-dasharray="10 150">
      <animate attributeName="stroke-dashoffset" values="300; 0" dur="4s" repeatCount="indefinite" />
    </path>
    <path d="M 1450 120 L 1300 250 L 1100 250" fill="none" stroke="#fff" stroke-width="3" stroke-dasharray="10 150">
      <animate attributeName="stroke-dashoffset" values="0; -300" dur="5s" repeatCount="indefinite" />
    </path>
  </g>

  <g>
    <g transform="translate(150, 150)">
      <circle cx="0" cy="0" r="35" fill="rgba(255,255,255,0.05)" stroke="url(#neonMagenta)" stroke-width="2" filter="url(#softGlow)">
        <animate attributeName="r" values="35; 38; 35" dur="3s" repeatCount="indefinite" />
      </circle>
      <image href="https://skillicons.dev/icons?i=python" x="-24" y="-24" width="48" height="48" />
    </g>

    <g transform="translate(300, 280)">
      <circle cx="0" cy="0" r="35" fill="rgba(255,255,255,0.05)" stroke="url(#neonCyan)" stroke-width="2" filter="url(#softGlow)">
        <animate attributeName="r" values="35; 38; 35" dur="4s" repeatCount="indefinite" />
      </circle>
      <image href="https://skillicons.dev/icons?i=tensorflow" x="-24" y="-24" width="48" height="48" />
    </g>

    <g transform="translate(180, 420)">
      <circle cx="0" cy="0" r="30" fill="rgba(255,255,255,0.05)" stroke="url(#neonMagenta)" stroke-width="2" filter="url(#softGlow)" />
      <image href="https://skillicons.dev/icons?i=mongodb" x="-20" y="-20" width="40" height="40" />
    </g>

    <g transform="translate(400, 380)">
      <circle cx="0" cy="0" r="30" fill="rgba(255,255,255,0.05)" stroke="url(#neonCyan)" stroke-width="2" filter="url(#softGlow)" />
      <image href="https://skillicons.dev/icons?i=postgres" x="-20" y="-20" width="40" height="40" />
    </g>

    <g transform="translate(350, 480)">
      <circle cx="0" cy="0" r="30" fill="rgba(255,255,255,0.05)" stroke="url(#neonCyan)" stroke-width="2" filter="url(#softGlow)" />
      <image href="https://skillicons.dev/icons?i=docker" x="-20" y="-20" width="40" height="40" />
    </g>


    <g transform="translate(1450, 120)">
      <circle cx="0" cy="0" r="35" fill="rgba(255,255,255,0.05)" stroke="url(#neonMagenta)" stroke-width="2" filter="url(#softGlow)">
        <animate attributeName="r" values="35; 38; 35" dur="3.5s" repeatCount="indefinite" />
      </circle>
      <image href="https://skillicons.dev/icons?i=aws" x="-24" y="-24" width="48" height="48" />
    </g>

    <g transform="translate(1300, 250)">
      <circle cx="0" cy="0" r="35" fill="rgba(255,255,255,0.05)" stroke="url(#neonCyan)" stroke-width="2" filter="url(#softGlow)">
        <animate attributeName="r" values="35; 38; 35" dur="4.5s" repeatCount="indefinite" />
      </circle>
      <image href="https://skillicons.dev/icons?i=nodejs" x="-24" y="-24" width="48" height="48" />
    </g>

    <g transform="translate(1420, 380)">
      <circle cx="0" cy="0" r="30" fill="rgba(255,255,255,0.05)" stroke="url(#neonMagenta)" stroke-width="2" filter="url(#softGlow)" />
      <image href="https://skillicons.dev/icons?i=react" x="-20" y="-20" width="40" height="40" />
    </g>

    <g transform="translate(1200, 350)">
      <circle cx="0" cy="0" r="30" fill="rgba(255,255,255,0.05)" stroke="url(#neonCyan)" stroke-width="2" filter="url(#softGlow)" />
      <image href="https://skillicons.dev/icons?i=ts" x="-20" y="-20" width="40" height="40" />
    </g>

    <g transform="translate(1250, 480)">
      <circle cx="0" cy="0" r="30" fill="rgba(255,255,255,0.05)" stroke="url(#neonCyan)" stroke-width="2" filter="url(#softGlow)" />
      <image href="https://skillicons.dev/icons?i=nextjs" x="-20" y="-20" width="40" height="40" />
    </g>
  </g>

  <rect x="350" y="140" width="900" height="260" rx="30" 
        fill="rgba(20, 10, 40, 0.55)" 
        stroke="rgba(255, 255, 255, 0.2)" stroke-width="1.5" 
        filter="url(#glassShadow)" />
  
  <rect x="352" y="142" width="896" height="256" rx="28" 
        fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="2" />

  <g text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-style="italic" letter-spacing="4">
    
    <text x="806" y="276" font-size="110" fill="#4facfe" opacity="0.4">Gireesh Kasa</text>
    <text x="804" y="274" font-size="110" fill="#7028e4" opacity="0.6">Gireesh Kasa</text>
    <text x="802" y="272" font-size="110" fill="#f5576c" opacity="0.8">Gireesh Kasa</text>

    <text x="800" y="270" font-size="110" fill="url(#textGrad)">
      Gireesh Kasa
      <animateTransform attributeName="transform" type="scale" values="1; 1.015; 1" dur="4s" repeatCount="indefinite" transform-origin="800 270" />
    </text>

    <text x="800" y="270" font-size="110" fill="none" stroke="url(#neonCyan)" stroke-width="1.5" stroke-dasharray="150 50" filter="url(#hyperGlow)" opacity="0.7">
      Gireesh Kasa
      <animate attributeName="stroke-dashoffset" values="200; 0" dur="8s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="scale" values="1; 1.015; 1" dur="4s" repeatCount="indefinite" transform-origin="800 270" />
    </text>
  </g>

  <g text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="20" font-weight="bold" letter-spacing="5">
    <text x="800" y="340" fill="#a18cd1" opacity="0.9">
      AI • MACHINE LEARNING • DEVOPS
      <animate attributeName="opacity" values="0.6; 1; 0.6" dur="3s" repeatCount="indefinite" />
    </text>
  </g>

</svg>
