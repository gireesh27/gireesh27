        <animate attributeName="r" values="35;39;35" dur="4s" repeatCount="indefinite"/>
      </circle>
      <use href="#icon-react" x="0" y="0">
        <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="12s" repeatCount="indefinite"/>
      </use>
    </g>

    <g transform="translate(250, 480)">
      <circle cx="0" cy="0" r="30" fill="rgba(255,255,255,0.05)" stroke="url(#neonMagenta)" stroke-width="2" filter="url(#softGlow)"/>
      <use href="#icon-db" x="0" y="0"/>
    </g>

    <g transform="translate(380, 380)">
      <circle cx="0" cy="0" r="30" fill="rgba(255,255,255,0.05)" stroke="url(#neonCyan)" stroke-width="2" filter="url(#softGlow)"/>
      <use href="#icon-aws" x="0" y="0"/>
    </g>

    <g transform="translate(1420, 140)">
      <circle cx="0" cy="0" r="35" fill="rgba(255,255,255,0.05)" stroke="url(#neonMagenta)" stroke-width="2.5" filter="url(#softGlow)">
        <animate attributeName="r" values="35;39;35" dur="3.5s" repeatCount="indefinite"/>
      </circle>
      <use href="#icon-ts" x="0" y="0"/>
    </g>

    <g transform="translate(1350, 240)">
      <circle cx="0" cy="0" r="35" fill="rgba(255,255,255,0.05)" stroke="url(#neonCyan)" stroke-width="2.5" filter="url(#softGlow)">
        <animate attributeName="r" values="35;40;35" dur="4.5s" repeatCount="indefinite"/>
      </circle>
      <use href="#icon-nodejs" x="0" y="0"/>
    </g>

    <g transform="translate(1450, 390)">
      <circle cx="0" cy="0" r="30" fill="rgba(255,255,255,0.05)" stroke="url(#neonMagenta)" stroke-width="2" filter="url(#softGlow)"/>
      <use href="#icon-python" x="0" y="0"/>
    </g>

    <g transform="translate(1250, 420)">
      <circle cx="0" cy="0" r="30" fill="rgba(255,255,255,0.05)" stroke="url(#neonCyan)" stroke-width="2" filter="url(#softGlow)"/>
      <use href="#icon-aws" x="0" y="0"/>
    </g>
  </g>

  <g class="text-3d-group" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-style="italic" letter-spacing="4">
    
    <text x="810" y="278" font-size="130" fill="#000000" opacity="0.8">Gireesh Kasa</text>
    <text x="808" y="276" font-size="130" fill="#4facfe" opacity="0.3">Gireesh Kasa</text>
    <text x="806" y="274" font-size="130" fill="#7028e4" opacity="0.5">Gireesh Kasa</text>
    <text x="804" y="272" font-size="130" fill="#f5576c" opacity="0.8">Gireesh Kasa</text>

    <text x="800" y="270" font-size="130" fill="url(#textGrad)">Gireesh Kasa</text>

    <text x="800" y="270" font-size="130" fill="none" stroke="url(#neonCyan)" stroke-width="2" stroke-dasharray="160 60" filter="url(#hyperGlow)" opacity="0.9">
      Gireesh Kasa
      <animate attributeName="stroke-dashoffset" values="220; 0" dur="7s" repeatCount="indefinite" />
    </text>

  </g>

  <g class="text-3d-group" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="24" font-weight="bold" letter-spacing="7">
    <text x="800" y="345" fill="#ffffff" filter="url(#softGlow)">
      AI • MACHINE LEARNING • DEVOPS
      <animate attributeName="opacity" values="1; 0.8; 1; 0.6; 1; 1" dur="4s" repeatCount="indefinite" />
    </text>
  </g>

</svg>
