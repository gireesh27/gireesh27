<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 550" width="1600" height="550">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020008" />
      <stop offset="40%" stop-color="#09021c" />
      <stop offset="100%" stop-color="#010005" />
    </linearGradient>

    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <linearGradient id="neonMagenta" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f093fb" />
      <stop offset="100%" stop-color="#7028e4" />
    </linearGradient>
    <linearGradient id="neonGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0" />
      <stop offset="80%" stop-color="#00ff41" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#00ff41" stop-opacity="0" />
    </linearGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="30%" stop-color="#e0c3fc" />
      <stop offset="70%" stop-color="#8ec5fc" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>

    <filter id="hyperGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur1" />
      <feGaussianBlur stdDeviation="30" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glassShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="25" stdDeviation="30" flood-color="#000000" flood-opacity="0.9"/>
    </filter>

    <g id="icon-python" transform="translate(-25, -25)">
      <path d="M 25 5 C 15 5 15 12 15 12 L 15 16 L 25 16 L 25 18 L 13 18 C 7 18 5 22 5 29 C 5 36 8 39 14 39 L 17 39 L 17 34 C 17 28 21 24 27 24 L 32 24 C 35 24 37 22 37 19 L 37 12 C 37 5 29 5 25 5 Z" fill="#3776AB"/>
      <path d="M 25 45 C 35 45 35 38 35 38 L 35 34 L 25 34 L 25 32 L 37 32 C 43 32 45 28 45 21 C 45 14 42 11 36 11 L 33 11 L 33 16 C 33 22 29 26 23 26 L 18 26 C 15 26 13 28 13 31 L 13 38 C 13 45 21 45 25 45 Z" fill="#FFD43B"/>
      <circle cx="19" cy="9" r="2.5" fill="white"/>
      <circle cx="31" cy="41" r="2.5" fill="white"/>
    </g>

    <g id="icon-react" transform="translate(-25, -25)">
      <g fill="none" stroke="#61DAFB" stroke-width="4">
        <ellipse cx="25" cy="25" rx="9" ry="22" transform="rotate(30 25 25)"/>
        <ellipse cx="25" cy="25" rx="9" ry="22" transform="rotate(90 25 25)"/>
        <ellipse cx="25" cy="25" rx="9" ry="22" transform="rotate(150 25 25)"/>
      </g>
      <circle cx="25" cy="25" r="4.5" fill="#61DAFB"/>
    </g>

    <g id="icon-docker" transform="translate(-25, -25)">
      <path d="M 8 26 C 8 35 14 40 25 40 C 36 40 42 34 42 26 C 42 23 38 23 38 23 C 38 19 32 20 32 20 C 29 19 27 21 27 21 L 8 21 Z" fill="#2496ED"/>
      <rect x="13" y="16" width="4" height="4" fill="#0db7ed"/>
      <rect x="18" y="16" width="4" height="4" fill="#0db7ed"/>
      <rect x="18" y="11" width="4" height="4" fill="#0db7ed"/>
      <rect x="23" y="16" width="4" height="4" fill="#0db7ed"/>
      <rect x="23" y="11" width="4" height="4" fill="#0db7ed"/>
      <rect x="23" y="6" width="4" height="4" fill="#0db7ed"/>
    </g>

    <g id="icon-aws" transform="translate(-25, -25)">
      <path d="M 8 32 C 16 39 34 39 42 32" fill="none" stroke="#FF9900" stroke-width="3.5"/>
      <polygon points="42,30 45,35 39,34" fill="#FF9900"/>
      <text x="25" y="26" font-family="Arial, sans-serif" font-weight="900" font-size="16" fill="white" text-anchor="middle">AWS</text>
    </g>

    <g id="icon-db" transform="translate(-25, -25)">
      <path d="M 12 15 L 12 35 C 12 40 25 44 38 35 L 38 15 Z" fill="#336791"/>
      <ellipse cx="25" cy="15" rx="13" ry="5" fill="#336791"/>
      <ellipse cx="25" cy="25" rx="13" ry="5" fill="#2A5475"/>
      <path d="M 12 25 C 12 30 25 34 38 25 L 38 35 C 38 40 25 44 12 35 Z" fill="#2A5475"/>
      <text x="25" y="29" font-family="Arial, sans-serif" font-weight="bold" font-size="10" fill="white" text-anchor="middle">SQL</text>
    </g>

    <g id="icon-mongodb" transform="translate(-25, -25)">
      <path d="M 25 3 C 25 3 13 15 13 30 C 13 40 18 45 25 48 C 32 45 37 40 37 30 C 37 15 25 3 25 3 Z" fill="#47A248"/>
      <path d="M 25 3 C 25 3 25 15 25 48 C 32 45 37 40 37 30 C 37 15 25 3 25 3 Z" fill="#3E8E41"/>
    </g>

    <g id="icon-tf" transform="translate(-25, -25)">
      <polygon points="12,10 38,10 38,18 28,18 28,40 22,40 22,18 12,18" fill="#FF6F00"/>
      <polygon points="28,18 38,18 38,26 32,26 32,34 28,34" fill="#FFA800"/>
    </g>

    <g id="icon-ts" transform="translate(-25, -25)">
      <rect x="5" y="5" width="40" height="40" rx="4" fill="#3178C6"/>
      <path d="M 23 24 L 23 36 L 19 36 L 19 24 L 13 24 L 13 20 L 29 20 L 29 24 Z" fill="white"/>
      <path d="M 38 31 C 38 35 35 38 31 38 C 27 38 25 35 25 32 L 29 31 C 30 33 31 34 33 33 C 34 32 34 31 33 30 L 30 29 C 27 28 25 26 25 23 C 25 19 28 17 31 17 C 35 17 38 19 38 22 L 35 23 C 34 21 32 20 31 20 C 30 20 29 21 29 22 L 32 23 C 35 24 38 26 38 31 Z" fill="white"/>
    </g>

    <g id="icon-java" transform="translate(-25, -25)">
      <path d="M 25 28 C 35 28 35 35 25 35 C 15 35 15 28 25 28 Z" fill="#f89820"/>
      <path d="M 15 28 C 15 38 35 38 35 28" fill="none" stroke="#5382a1" stroke-width="4"/>
      <path d="M 20 10 C 25 5 25 15 30 10" fill="none" stroke="#f89820" stroke-width="3"/>
      <path d="M 15 15 C 20 10 20 20 25 15" fill="none" stroke="#f89820" stroke-width="3"/>
    </g>

    <g id="icon-nodejs" transform="translate(-25, -25)">
      <polygon points="25,5 45,15 45,35 25,45 5,35 5,15" fill="#339933"/>
      <path d="M 20 30 L 20 18 L 15 20 L 15 32 Z" fill="white"/>
      <path d="M 35 25 C 35 20 30 18 25 20 L 25 32 C 30 30 35 28 35 25 Z" fill="none" stroke="white" stroke-width="3"/>
    </g>

  </defs>

  <style>
    /* 3D Text Animation from Bottom Origin */
    .text-3d-group {
      transform-origin: center 400px;
      animation: tilt3D 8s infinite ease-in-out alternate;
    }
    @keyframes tilt3D {
      0% { transform: perspective(1200px) rotateX(15deg) rotateY(-8deg) translateY(-5px); }
      50% { transform: perspective(1200px) rotateX(-5deg) rotateY(8deg) translateY(5px); }
      100% { transform: perspective(1200px) rotateX(10deg) rotateY(-4deg) translateY(-2px); }
    }

    /* Thinking Core Animation */
    .brain-core { transform-origin: 800px 270px; animation: pulseBrain 4s infinite alternate; }
    @keyframes pulseBrain { 
      0% { transform: scale(1) rotate(0deg); opacity: 0.4; } 
      100% { transform: scale(1.15) rotate(10deg); opacity: 0.9; } 
    }
    
    /* Fast Synapse Firing */
    .synapse { stroke-dasharray: 15 120; animation: fireSynapse 2.5s infinite linear; }
    @keyframes fireSynapse { to { stroke-dashoffset: -135; } }
  </style>

  <rect width="1600" height="550" fill="url(#bgGrad)" />

  <g font-family="monospace" font-size="14" font-weight="bold" fill="#00ff41" opacity="0.35" style="writing-mode: vertical-rl;">
    <text x="50" y="0"><animateTransform attributeName="transform" type="translate" values="0,-150; 0,650" dur="6s" repeatCount="indefinite" />01011001 10</text>
    <text x="180" y="0"><animateTransform attributeName="transform" type="translate" values="0,-300; 0,650" dur="8s" repeatCount="indefinite" />11001010 01</text>
    <text x="320" y="0"><animateTransform attributeName="transform" type="translate" values="0,-50; 0,650" dur="5s" repeatCount="indefinite" />0011 1100</text>
    <text x="480" y="0"><animateTransform attributeName="transform" type="translate" values="0,-400; 0,650" dur="9s" repeatCount="indefinite" />10101 010</text>
    <text x="1120" y="0"><animateTransform attributeName="transform" type="translate" values="0,-150; 0,650" dur="7s" repeatCount="indefinite" />0110001 11</text>
    <text x="1280" y="0"><animateTransform attributeName="transform" type="translate" values="0,-250; 0,650" dur="6.5s" repeatCount="indefinite" />1110 0110</text>
    <text x="1420" y="0"><animateTransform attributeName="transform" type="translate" values="0,-50; 0,650" dur="5.5s" repeatCount="indefinite" />0101 1010</text>
    <text x="1560" y="0"><animateTransform attributeName="transform" type="translate" values="0,-350; 0,650" dur="7.5s" repeatCount="indefinite" />11001100 0</text>
  </g>

  <g filter="url(#hyperGlow)" opacity="0.35">
    <ellipse cx="200" cy="400" rx="280" ry="180" fill="url(#neonMagenta)">
      <animateTransform attributeName="transform" type="rotate" values="0 200 400; 360 200 400" dur="25s" repeatCount="indefinite" />
      <animate attributeName="rx" values="280; 330; 280" dur="12s" repeatCount="indefinite" />
    </ellipse>
    <ellipse cx="1400" cy="150" rx="320" ry="220" fill="url(#neonCyan)">
      <animateTransform attributeName="transform" type="rotate" values="360 1400 150; 0 1400 150" dur="30s" repeatCount="indefinite" />
      <animate attributeName="ry" values="220; 280; 220" dur="15s" repeatCount="indefinite" />
    </ellipse>
  </g>

  <g class="brain-core" fill="none" stroke-width="2" filter="url(#hyperGlow)">
    <circle cx="800" cy="270" r="90" stroke="url(#neonMagenta)" stroke-dasharray="15 25" />
    <circle cx="800" cy="270" r="65" stroke="url(#neonCyan)" stroke-dasharray="40 10" />
    <circle cx="800" cy="270" r="45" stroke="#ffffff" opacity="0.4" />
    <path d="M800,180 L800,40 M800,360 L800,510 M710,270 L480,270 M890,270 L1120,270" stroke="url(#neonCyan)" stroke-width="3" class="synapse" />
    <path d="M735,205 L580,80 M865,335 L1020,460 M735,335 L580,460 M865,205 L1020,80" stroke="url(#neonMagenta)" stroke-width="3" class="synapse" style="animation-delay: -1.2s;" />
  </g>

  <g stroke="rgba(255, 255, 255, 0.3)" stroke-width="2" filter="url(#softGlow)">
    
    <line x1="220" y1="200" x2="120" y2="-50">
      <animate attributeName="y2" values="-50; 650" dur="14s" repeatCount="indefinite" />
    </line>

    <line x1="380" y1="380" x2="600" y2="-150">
      <animate attributeName="y2" values="-150; 650" dur="18s" repeatCount="indefinite" />
    </line>

    <line x1="1350" y1="240" x2="1050" y2="-100">
      <animate attributeName="y2" values="-100; 650" dur="16s" repeatCount="indefinite" />
    </line>

    <line x1="1250" y1="420" x2="1480" y2="-200">
      <animate attributeName="y2" values="-200; 650" dur="15s" repeatCount="indefinite" />
    </line>
  </g>

  <g stroke="url(#neonCyan)" stroke-width="2" stroke-opacity="0.5" filter="url(#softGlow)">
    <path d="M 220 200 L 320 330 L 250 480 M 320 330 L 380 380 L 250 480" fill="none" />
    <path d="M 1420 140 L 1350 240 L 1450 390 L 1250 420 M 1350 240 L 1250 420" fill="none" />
    <path d="M 220 200 L 320 330 L 380 380" fill="none" stroke="#fff" stroke-width="3.5" class="synapse" />
    <path d="M 1420 140 L 1350 240 L 1250 420" fill="none" stroke="#fff" stroke-width="3.5" class="synapse" style="animation-duration: 3.5s;" />
  </g>

  <rect x="300" y="130" width="1000" height="280" rx="35" 
        fill="rgba(12, 4, 25, 0.65)" 
        stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5" 
        filter="url(#glassShadow)" />
  
  <rect x="302" y="132" width="996" height="276" rx="33" 
        fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="2" />

  <g filter="url(#softGlow)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="120,-50; 120,650" dur="14s" repeatCount="indefinite" />
      <circle cx="0" cy="0" r="28" fill="#110522" stroke="url(#neonMagenta)" stroke-width="2" />
      <use href="#icon-java" x="0" y="0"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate" values="600,-150; 600,650" dur="18s" repeatCount="indefinite" />
      <circle cx="0" cy="0" r="28" fill="#110522" stroke="url(#neonCyan)" stroke-width="2" />
      <use href="#icon-docker" x="0" y="0"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate" values="1050,-100; 1050,650" dur="16s" repeatCount="indefinite" />
      <circle cx="0" cy="0" r="28" fill="#110522" stroke="url(#neonMagenta)" stroke-width="2" />
      <use href="#icon-tf" x="0" y="0"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate" values="1480,-200; 1480,650" dur="15s" repeatCount="indefinite" />
      <circle cx="0" cy="0" r="28" fill="#110522" stroke="url(#neonCyan)" stroke-width="2" />
      <use href="#icon-mongodb" x="0" y="0"/>
    </g>
  </g>

  <g>
    <g transform="translate(220, 200)">
      <circle cx="0" cy="0" r="35" fill="rgba(255,255,255,0.05)" stroke="url(#neonMagenta)" stroke-width="2.5" filter="url(#softGlow)">
        <animate attributeName="r" values="35;40;35" dur="3s" repeatCount="indefinite"/>
      </circle>
      <use href="#icon-python" x="0" y="0"/>
    </g>

    <g transform="translate(320, 330)">
